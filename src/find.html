<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Find</title>
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="find.css" />
  </head>
  <body>
    <input id="fi" type="text" placeholder="Find in page" spellcheck="false" autocomplete="off" aria-label="Find in page" />
    <span id="count">0/0</span>
    <span class="sep"></span>
    <button id="prev" type="button" aria-label="Previous match" title="Previous (Shift+Enter)">&#8249;</button>
    <button id="next" type="button" aria-label="Next match" title="Next (Enter)">&#8250;</button>
    <button id="close" type="button" aria-label="Close find" title="Close (Esc)">&#10005;</button>
    <script src="find.js"></script>
  </body>
</html>
