<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https:; font-src 'self'; object-src 'none'; base-uri 'none'; frame-src 'none'" />
    <title>Slash</title>
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="tabstrip">
      <div id="tabs" role="tablist" aria-label="Browser tabs"></div>
      <button id="tab-new" class="tool tab-add" type="button" aria-label="New tab" title="New tab (Ctrl+T)">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" /></svg>
      </button>
    </div>

    <div id="toolbar">
      <div class="tb-group">
        <button id="back" class="tool" type="button" aria-label="Back" title="Back">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" /></svg>
        </button>
        <button id="forward" class="tool" type="button" aria-label="Forward" title="Forward">
          <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6" /></svg>
        </button>
        <button id="reload" class="tool" type="button" aria-label="Reload" title="Reload">
          <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 1 2.64 6.36M3 18v-4h4" /></svg>
        </button>
        <button id="home" class="tool" type="button" aria-label="Home" title="Home (start page)">
          <svg viewBox="0 0 24 24"><path d="M4 11l8-7 8 7" /><path d="M6 9.5V20h12V9.5" /></svg>
        </button>
      </div>

      <div id="omnibox">
        <button id="siteinfo" class="siteinfo hidden" type="button" aria-label="Site information" title="Site information">
          <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2" /><path d="M8 11V8a4 4 0 0 1 8 0v3" /></svg>
        </button>
        <button id="omni-engine" class="omni-engine" type="button" aria-label="Search engine" title="Change search engine">
          <img class="oe-fav" alt="" />
          <svg class="oe-caret" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6" /></svg>
        </button>
        <input
          id="omnibar"
          type="text"
          placeholder="Search or enter address"
          spellcheck="false"
          autocomplete="off"
          aria-label="Address and search bar"
        />
        <button id="add-engine" class="tool add-engine hidden" type="button" aria-label="Add this site to your search engines" title="Add this site to your search engines">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" /><path d="M21 21l-3.5-3.5M11 8.5v5M8.5 11h5" /></svg>
        </button>
      </div>

      <div class="tb-group">
        <button id="shield" class="tool" type="button" aria-label="Tracker and ad blocking" title="Tracker &amp; ad blocking">
          <svg viewBox="0 0 24 24"><path d="M12 3l7 3v5.5c0 4.2-2.9 7-7 8.5-4.1-1.5-7-4.3-7-8.5V6z" /></svg>
          <span id="shield-badge" class="badge hidden"></span>
        </button>
        <button id="star" class="tool" type="button" aria-label="Bookmark this page" title="Bookmark (Ctrl+D)">
          <svg viewBox="0 0 24 24"><path d="M18 21l-6-4.2L6 21V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2z" /></svg>
        </button>
        <button id="downloads" class="tool" type="button" aria-label="Downloads" title="Downloads">
          <svg viewBox="0 0 24 24"><path d="M12 4v11M7.5 11l4.5 4 4.5-4M5 20h14" /></svg>
        </button>
        <button id="ai" class="tool" type="button" aria-label="Toggle AI panel" title="AI panel (Ctrl+J)">
          <svg viewBox="0 0 24 24"><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8z" /></svg>
        </button>
        <button id="perf" class="tool" type="button" aria-label="Memory panel" title="Memory &amp; performance">
          <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2" /><rect x="9.5" y="9.5" width="5" height="5" rx="1" /><path d="M9.5 3v3M14.5 3v3M9.5 18v3M14.5 18v3M3 9.5h3M3 14.5h3M18 9.5h3M18 14.5h3" /></svg>
        </button>
      </div>

      <div id="ext-pinned" class="ext-pinned tb-group"></div>
      <button id="ext-menu" class="tool ext-menu hidden" type="button" aria-label="Extensions" title="Extensions">
        <svg viewBox="0 0 24 24"><path d="M14.5 3.5a2 2 0 0 0-4 0c0 .5.2 1 .5 1.5H8a1 1 0 0 0-1 1v2.5c-.5-.3-1-.5-1.5-.5a2 2 0 0 0 0 4c.5 0 1-.2 1.5-.5V17a1 1 0 0 0 1 1h3.5c-.3.5-.5 1-.5 1.5a2 2 0 0 0 4 0c0-.5-.2-1-.5-1.5H18a1 1 0 0 0 1-1v-3.5c.5.3 1 .5 1.5.5a2 2 0 0 0 0-4c-.5 0-1 .2-1.5.5V6a1 1 0 0 0-1-1h-3c.3-.5.5-1 .5-1.5z"/></svg>
      </button>

      <div class="tb-sep"></div>

      <div class="tb-group">
        <span id="profile-badge" class="profile-badge hidden"></span>
        <button id="profile" class="tool" type="button" aria-label="Profile" title="Profile"><span class="avatar">S</span></button>
        <button id="menu-btn" class="tool menu-btn" type="button" aria-label="Menu" title="Menu">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.7" /><circle cx="12" cy="12" r="1.7" /><circle cx="12" cy="19" r="1.7" /></svg>
        </button>
      </div>
    </div>

    <div id="bookmarks"></div>

    <div id="infobar" class="hidden">
      <span id="ib-text" class="ib-text"></span>
      <div id="ib-actions" class="ib-actions"></div>
    </div>

    <div id="progress" class="progress"></div>

    <script src="chrome.js"></script>
  </body>
</html>
