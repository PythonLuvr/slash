<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'none'; font-src 'self'; object-src 'none'; base-uri 'none'; frame-src 'none'" />
    <title>Not secure</title>
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="interstitial.css" />
  </head>
  <body>
    <div id="card">
      <div id="mark" aria-hidden="true">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3.5l8.5 15h-17z" />
          <line x1="12" y1="10" x2="12" y2="14" />
          <circle cx="12" cy="17" r="0.7" fill="currentColor" />
        </svg>
      </div>
      <h1>This site can't be loaded securely</h1>
      <p id="explain">
        Slash tried to reach <span id="host" class="host"></span> over HTTPS and
        it failed. The site may not support a secure connection. Continuing
        loads it over plain HTTP, which can be read or altered on the network.
      </p>
      <div id="row">
        <button id="back" type="button">Go back</button>
        <button id="proceed" type="button">Continue to site (not secure)</button>
      </div>
    </div>
    <script src="interstitial.js"></script>
  </body>
</html>
