name: Bug report
description: Something in Slash is broken or behaving wrong
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting. The more detail you give, the faster it gets fixed.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug, and what you expected instead.
      placeholder: When I ..., Slash ... . I expected ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can someone else trigger it?
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Slash version
      description: Shown in the menu / release tag (e.g. 1.0.0). Or the commit if you built from source.
      placeholder: "1.0.0"
    validations:
      required: true
  - type: dropdown
    id: build
    attributes:
      label: How are you running Slash
      options:
        - Installed build (Slash Setup .exe)
        - Built from source (npm start)
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11, macOS 14, Ubuntu 24.04, ..."
    validations:
      required: true
  - type: dropdown
    id: ai
    attributes:
      label: AI provider (if the bug is AI related)
      options:
        - Not AI related
        - Claude (CLI)
        - Claude (API)
        - Gemini (CLI)
        - Gemini (API)
        - ChatGPT (CLI)
        - ChatGPT (API)
  - type: textarea
    id: logs
    attributes:
      label: Errors or screenshots
      description: Any console output, error text, or screenshots. Code blocks render automatically here.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
